# Cały backend: API Laravel + PostgreSQL
# Uruchomienie: docker compose up -d --build
# API: http://localhost:8000
# Frontend nadal lokalnie: cd ../data-report-studio && npm run dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: report-forge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: report-forge-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: report_forge
      POSTGRES_USER: report_forge
      POSTGRES_PASSWORD: report_forge
    volumes:
      - report_forge_pgdata_v18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report_forge -d report_forge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  report_forge_pgdata_v18:
